name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        # install the data + ctgov extras so the substantive tests RUN, not skip
        run: pip install -e ".[dev,analysis,ctgov]"
      - name: Lint
        run: ruff check src tests
        continue-on-error: true
      - name: Test
        run: pytest -q
